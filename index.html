<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailsa &amp; Ken — Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --deep:   #0d4f6b;
  --mid:    #1e7294;
  --bright: #3a9fbe;
  --foam:   #a8d8e8;
  --pale:   #d6eef5;
  --sand:   #f4ece0;
  --gold:   #c9a862;
  --golddark:#8b6820;
}

html{scroll-behavior:smooth}

body{
  background: linear-gradient(175deg,
    var(--deep) 0%,
    var(--mid)  22%,
    var(--bright) 44%,
    var(--foam) 66%,
    #e8f4f8 82%,
    var(--sand) 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:36px 20px 70px;
  font-family:'Lato',sans-serif;
  overflow-x:hidden;
  position:relative;
}

/* ─ Bubbles ─ */
.bubble{
  position:fixed; border-radius:50%;
  background:rgba(255,255,255,0.22);
  pointer-events:none; animation:rise linear infinite; z-index:0;
}
@keyframes rise{
  0%  {transform:translateY(0) scale(1);   opacity:0}
  8%  {opacity:.55}
  90% {opacity:.25}
  100%{transform:translateY(-105vh) scale(.5); opacity:0}
}

/* ─ Petals ─ */
.petal{
  position:fixed; top:-30px; border-radius:50% 0 50% 0;
  pointer-events:none; animation:petalFall linear infinite; z-index:1;
}
@keyframes petalFall{
  0%  {transform:translateY(0) rotate(0deg) translateX(0);  opacity:0}
  8%  {opacity:.7}
  90% {opacity:.35}
  100%{transform:translateY(108vh) rotate(500deg) translateX(50px); opacity:0}
}

/* ─ Header ─ */
#hdr{
  z-index:10; text-align:center; margin-bottom:24px;
  opacity:0; transform:translateY(-12px);
  transition:opacity 1.1s ease,transform 1.1s ease;
}
#hdr.show{opacity:1;transform:translateY(0)}
#hdr h1{
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:clamp(12px,2.5vw,15px); letter-spacing:.38em;
  color:rgba(255,255,255,.88); text-transform:uppercase;
}
#hdr .bar{width:50px;height:1px;background:var(--gold);margin:9px auto;opacity:.75}

/* ─ Countdown ─ */
#cdwrap{
  z-index:10; margin-bottom:32px;
  opacity:0; transform:translateY(10px);
  transition:opacity 1.2s ease .35s,transform 1.2s ease .35s;
}
#cdwrap.show{opacity:1;transform:translateY(0)}
#cdlabel{
  text-align:center; font-family:'Cormorant Garamond',serif;
  font-size:11px; letter-spacing:.3em; color:rgba(255,255,255,.65);
  text-transform:uppercase; margin-bottom:12px;
}
#countdown{display:flex;gap:8px;justify-content:center;align-items:flex-start}
.cdb{
  background:rgba(255,255,255,.13);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25);
  border-radius:10px; padding:12px 14px 10px;
  min-width:66px; text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
}
.cdn{
  font-family:'Cormorant Garamond',serif;
  font-size:32px; font-weight:400; color:#fff; line-height:1;
}
.cdl{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:5px}
.cds{color:rgba(255,255,255,.4);font-size:24px;line-height:1;padding-top:12px;font-family:'Cormorant Garamond',serif}

/* ─ Stage (holds envelope + hidden card) ─ */
#stage{
  position:relative; z-index:10;
  width:340px; min-height:240px;
  display:flex; flex-direction:column; align-items:center;
}

/* ─ Envelope ─ */
#envwrap{
  position:relative; width:340px; height:224px;
  cursor:pointer;
  filter:drop-shadow(0 10px 36px rgba(0,30,60,.35));
  transition:transform .3s,filter .3s;
  flex-shrink:0;
}
#envwrap:hover{transform:scale(1.025) translateY(-3px);filter:drop-shadow(0 16px 40px rgba(0,30,60,.45))}

.ebdy{
  position:absolute; bottom:0; left:0; width:100%; height:100%;
  background:linear-gradient(155deg,#e8f6fb 50%,#bde0ee);
  border-radius:3px 3px 12px 12px;
  border:1px solid rgba(255,255,255,.55);
}
.ebdy::before{
  content:''; position:absolute; bottom:0; left:0; width:0; height:0;
  border-style:solid; border-width:0 0 112px 170px;
  border-color:transparent transparent #8ec8dd transparent;
}
.ebdy::after{
  content:''; position:absolute; bottom:0; right:0; width:0; height:0;
  border-style:solid; border-width:112px 170px 0 0;
  border-color:#8ec8dd transparent transparent transparent;
}
.ebot{
  position:absolute; bottom:0; left:0; width:0; height:0;
  border-style:solid; border-width:0 170px 115px 170px;
  border-color:transparent transparent #6fb8d2 transparent; z-index:2;
}
#flap{
  position:absolute; top:0; left:0; width:0; height:0;
  border-style:solid; border-width:115px 170px 0 170px;
  border-color:#3a9fbe transparent transparent transparent;
  transform-origin:top center; transform:rotateX(0deg);
  transition:transform 1s cubic-bezier(.4,0,.2,1);
  z-index:5;
}
#flap.open{transform:rotateX(-180deg)}

#seal{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:56px; height:56px;
  background:radial-gradient(circle at 36% 30%,#4fc3e0,var(--deep));
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:13px;
  color:rgba(255,255,255,.9); letter-spacing:.05em;
  z-index:6; cursor:pointer;
  box-shadow:0 3px 14px rgba(0,60,100,.35),inset 0 1px 2px rgba(255,255,255,.28);
  border:1.5px solid rgba(255,255,255,.3);
  transition:opacity .4s,transform .4s;
}
#seal.hide{opacity:0;transform:translate(-50%,-50%) scale(.35);pointer-events:none}
#seal::after{
  content:''; position:absolute;
  width:68px; height:68px; border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  animation:pulse 2.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.18);opacity:0}}

/* ─ Hint ─ */
#hint{
  margin-top:15px; font-family:'Cormorant Garamond',serif;
  font-size:14px; color:rgba(255,255,255,.8);
  letter-spacing:.18em; text-align:center;
  animation:bob 2.6s ease-in-out infinite;
  transition:opacity .4s;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
#hint.hide{opacity:0}

/* ─ Card (lives inside stage, absolutely positioned) ─ */
#card{
  position:absolute;
  bottom:6px; left:50%;
  transform:translateX(-50%);
  width:292px;
  border-radius:6px; overflow:hidden;
  box-shadow:0 6px 28px rgba(0,30,60,.22);
  opacity:0; z-index:3;
  /* NO default transition — we control this purely via JS inline styles */
}
#card img{width:100%;display:block}

/* ─ Final card (after animation settles) ─ */
#card-final-wrap{
  z-index:10; margin-top:24px;
  display:none; opacity:0;
  transition:opacity .7s ease;
}
#card-final-wrap.show{display:block;opacity:1}
#card-final-wrap img{
  width:min(360px,90vw); display:block;
  border-radius:8px;
  box-shadow:0 16px 60px rgba(0,30,60,.35);
}

/* ─ Details ─ */
#details{
  z-index:10; margin-top:26px; text-align:center;
  opacity:0; transform:translateY(20px);
  transition:opacity .9s ease,transform .9s ease;
}
#details.show{opacity:1;transform:translateY(0)}
.ddate{
  font-family:'Cormorant Garamond',serif; font-size:19px;
  letter-spacing:.24em; color:#fff; font-weight:300;
}
.dvenue{
  font-size:12px; letter-spacing:.18em; margin-top:8px;
  color:rgba(255,255,255,.7); text-transform:uppercase;
}
.dbar{width:48px;height:1px;background:var(--gold);margin:14px auto}
.dbrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.dbrow a{
  display:inline-block; padding:10px 24px;
  border:1px solid rgba(255,255,255,.45); color:#fff;
  text-decoration:none; font-size:10px; letter-spacing:.22em;
  border-radius:3px; text-transform:uppercase;
  background:rgba(255,255,255,.1); backdrop-filter:blur(4px);
  transition:background .25s,border-color .25s;
  font-family:'Lato',sans-serif;
}
.dbrow a:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.8)}
.dbrow a.gold{background:var(--gold);border-color:var(--gold)}
.dbrow a.gold:hover{background:var(--golddark);border-color:var(--golddark)}

/* ─ Music btn ─ */
#mbtn{
  position:fixed; bottom:22px; right:22px;
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,.15); backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.28);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:20px; z-index:200;
  box-shadow:0 3px 14px rgba(0,0,0,.18);
  transition:background .25s;
}
#mbtn:hover{background:rgba(255,255,255,.28)}
</style>
</head>

<!-- Music button -->
<div id="mbtn" onclick="toggleMusic()" title="Toggle music">🎵</div>

<script>
// ── Countdown ──────────────────────────────────────────────────
function tick() {
  const target = new Date('2026-06-28T16:00:00+08:00');
  const diff   = target - Date.now();
  if (diff <= 0) {
    document.getElementById('cdwrap').innerHTML =
      '<p style="font-family:Cormorant Garamond,serif;font-size:24px;color:#fff;letter-spacing:.2em;text-align:center">Today is the day! 🎉</p>';
    return;
  }
  const d = Math.floor(diff / 864e5);
  const h = Math.floor((diff % 864e5) / 36e5);
  const m = Math.floor((diff % 36e5) / 6e4);
  const s = Math.floor((diff % 6e4) / 1e3);
  document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
}
tick(); setInterval(tick, 1000);

// ── Bubbles ────────────────────────────────────────────────────
function bubble() {
  const el = document.createElement('div');
  el.className = 'bubble';
  const sz = 4 + Math.random() * 14;
  el.style.cssText = `left:${Math.random()*100}vw;bottom:-20px;width:${sz}px;height:${sz}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*4}s`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 18000);
}
setInterval(bubble, 450); for(let i=0;i<14;i++) setTimeout(bubble, i*130);

// ── Petals ─────────────────────────────────────────────────────
const PC = ['#f4d0d0','#fce8e0','#cce8f4','#e8f4d0','#faf0e0','#b8e0f4'];
function petal() {
  const el = document.createElement('div');
  el.className = 'petal';
  const sz = 10 + Math.random() * 10;
  el.style.cssText = `left:${Math.random()*100}vw;width:${sz}px;height:${sz*1.4}px;background:${PC[Math.floor(Math.random()*PC.length)]};animation-duration:${8+Math.random()*9}s;animation-delay:${Math.random()*4}s;transform:rotate(${Math.random()*360}deg)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 22000);
}
setInterval(petal, 550); for(let i=0;i<7;i++) setTimeout(petal, i*280);

// ── Fade in header + countdown ─────────────────────────────────
setTimeout(() => document.getElementById('hdr').classList.add('show'), 350);
setTimeout(() => document.getElementById('cdwrap').classList.add('show'), 650);

// ── Open envelope ──────────────────────────────────────────────
let opened = false;
function openEnvelope() {
  if (opened) return;
  opened = true;

  // Hide hint + seal
  document.getElementById('hint').classList.add('hide');
  document.getElementById('seal').classList.add('hide');

  // Open flap
  document.getElementById('flap').classList.add('open');

  // After flap is open, animate card rising out of envelope
  setTimeout(() => {
    const card = document.getElementById('card');
    // Show card at rest inside envelope
    card.style.opacity  = '1';
    card.style.transition = 'none';
    card.style.transform  = 'translateX(-50%) translateY(0px)';

    // Force a paint then start the rise
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.style.transition = 'transform 1.3s cubic-bezier(0.22,1,0.36,1), opacity 0.5s ease';
      card.style.transform  = 'translateX(-50%) translateY(-290px)';
    }));
  }, 700);

  // After card has risen fully — swap to the "final" card and remove envelope
  setTimeout(() => {
    const stage   = document.getElementById('stage');
    const card    = document.getElementById('card');
    const envwrap = document.getElementById('envwrap');
    const final   = document.getElementById('card-final-wrap');

    // Fade out and remove stage
    stage.style.transition = 'opacity 0.5s';
    stage.style.opacity    = '0';

    // Immediately show the final card (it's already at opacity:0, transition will play)
    setTimeout(() => {
      stage.style.display = 'none';
      final.style.display = 'block';
      // Trigger transition on next frame
      requestAnimationFrame(() => requestAnimationFrame(() => {
        final.style.opacity = '1';
      }));
    }, 450);

    // Show details a beat after card appears
    setTimeout(() => document.getElementById('details').classList.add('show'), 900);
  }, 2200);
}

// ── Music ──────────────────────────────────────────────────────
// Replace the src below with your music file path once uploaded to GitHub.
// e.g. src = 'music.mp3'  (if uploaded alongside index.html)
const audio = new Audio();
audio.loop  = true;
// audio.src = 'music.mp3';   ← uncomment and set filename after you upload your music

let musicOn = false;
function toggleMusic() {
  if (!audio.src || audio.src === window.location.href) {
    alert('Music file not yet connected.\nUpload your audio file to GitHub alongside index.html, then update the src in the code.');
    return;
  }
  if (musicOn) { audio.pause(); document.getElementById('mbtn').textContent='🎵'; }
  else         { audio.play().catch(()=>{}); document.getElementById('mbtn').textContent='⏸'; }
  musicOn = !musicOn;
}
</script>
