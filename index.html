<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailsa & Ken — Wedding Invitation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5ede0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Petals ── */
  .petal {
    position: fixed;
    top: -40px;
    width: 14px;
    height: 20px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── Envelope scene ── */
  #scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    z-index: 10;
  }

  /* ── Envelope ── */
  #envelope-wrap {
    position: relative;
    width: 340px;
    height: 220px;
    cursor: pointer;
    filter: drop-shadow(0 8px 32px rgba(120,80,40,0.18));
    transition: transform 0.3s;
  }
  #envelope-wrap:hover { transform: scale(1.02); }

  .env-body {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #f9f0e3 60%, #ede0cc);
    border-radius: 4px 4px 12px 12px;
    overflow: hidden;
  }
  .env-body::before { /* side triangles */
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 110px 170px;
    border-color: transparent transparent #e8d5bb transparent;
  }
  .env-body::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 110px 170px 0 0;
    border-color: #e8d5bb transparent transparent transparent;
  }

  /* bottom triangle */
  .env-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 170px 115px 170px;
    border-color: transparent transparent #ddc9a8 transparent;
    z-index: 2;
  }

  /* flap */
  .env-flap {
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 115px 170px 0 170px;
    border-color: #e0ccaf transparent transparent transparent;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
    z-index: 5;
  }
  .env-flap.open {
    transform: rotateX(-180deg);
  }

  /* wax seal */
  #seal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px;
    background: radial-gradient(circle at 40% 35%, #c9a96e, #8b5e1a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; color: #fff5e0;
    z-index: 6;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: opacity 0.4s, transform 0.4s;
    cursor: pointer;
  }
  #seal.hide { opacity: 0; transform: translate(-50%, -50%) scale(0.5); pointer-events: none; }

  #open-hint {
    margin-top: 18px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: #a0846a;
    letter-spacing: 0.15em;
    opacity: 1;
    transition: opacity 0.4s;
    text-align: center;
  }
  #open-hint.hide { opacity: 0; }

  /* ── Card ── */
  #card {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%) translateY(0px);
    width: 300px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(80,50,20,0.15);
    opacity: 0;
    z-index: 3;
    transition: opacity 0s, transform 0s;
  }
  #card img {
    width: 100%;
    display: block;
  }
  #card.rising {
    transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
    opacity: 1;
    transform: translateX(-50%) translateY(-260px);
  }
  #card.final {
    position: relative;
    bottom: auto;
    left: auto;
    transform: none;
    width: 340px;
    opacity: 1;
    transition: none;
    margin-top: 24px;
    box-shadow: 0 12px 48px rgba(80,50,20,0.2);
  }

  /* ── Details revealed below card ── */
  #details {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    text-align: center;
    margin-top: 20px;
    color: #7a5c3a;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.12em;
    font-size: 14px;
  }
  #details.show { opacity: 1; transform: translateY(0); }
  #details a {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 28px;
    border: 1px solid #c9a96e;
    color: #8b5e1a;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.2em;
    border-radius: 2px;
    transition: background 0.3s, color 0.3s;
  }
  #details a:hover { background: #c9a96e; color: #fff; }

  /* ── Header ── */
  #page-header {
    opacity: 0;
    transform: translateY(-12px);
    transition: opacity 1s ease, transform 1s ease;
    text-align: center;
    margin-bottom: 30px;
    color: #8b5e1a;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.22em;
    font-size: 12px;
    text-transform: uppercase;
  }
  #page-header.show { opacity: 1; transform: translateY(0); }

  /* ── Music note ── */
  #music-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: 1px solid #c9a96e;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    z-index: 100;
    transition: background 0.2s;
  }
  #music-btn:hover { background: #c9a96e; }
</style>
</head>
<body>

<!-- Petals (created by JS) -->

<div id="page-header">
  You are cordially invited
</div>

<div id="scene">
  <div id="card">
    <img id="invite-img" src="" alt="Ailsa & Ken Wedding Invitation">
  </div>

  <div id="envelope-wrap" onclick="openEnvelope()">
    <div class="env-body"></div>
    <div class="env-bottom"></div>
    <div class="env-flap" id="flap"></div>
    <div id="seal">A&K</div>
  </div>
</div>

<p id="open-hint">✦ Click to open your invitation ✦</p>

<div id="details">
  <p>28 · June · 2026</p>
  <p style="margin-top:6px;">The Laguna, A Luxury Collection Resort & Spa, Bali</p>
  <a href="https://maps.google.com/?q=The+Laguna+Resort+Bali" target="_blank">View on Map</a>
</div>

<div id="music-btn" title="Toggle music" onclick="toggleMusic()">🎵</div>

<!-- Ambient background music (optional — will only play if user has interacted) -->
<audio id="bg-music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

// ── Petals ──
const petalColors = ['#f4c2c2','#f9e0d0','#e8f0c8','#fae0e0','#f0e8d8','#ddf0d8'];
function makePetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.background = petalColors[Math.floor(Math.random() * petalColors.length)];
  p.style.animationDuration = (7 + Math.random() * 8) + 's';
  p.style.animationDelay = (Math.random() * 6) + 's';
  p.style.width = (10 + Math.random() * 10) + 'px';
  p.style.height = (14 + Math.random() * 12) + 'px';
  p.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 18000);
}
setInterval(makePetal, 400);
for(let i=0;i<8;i++) setTimeout(makePetal, i * 200);

// ── Page header fade in ──
setTimeout(() => document.getElementById('page-header').classList.add('show'), 400);

// ── Open envelope ──
let opened = false;
function openEnvelope() {
  if (opened) return;
  opened = true;

  // Hide hint and seal
  document.getElementById('open-hint').classList.add('hide');
  document.getElementById('seal').classList.add('hide');

  // Open flap
  document.getElementById('flap').classList.add('open');

  // After flap opens, show and raise card
  setTimeout(() => {
    const card = document.getElementById('card');
    card.style.opacity = '1';
    card.style.transition = 'none';

    // trigger reflow then animate
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.classList.add('rising');
      });
    });
  }, 600);

  // After card has risen, reposition everything
  setTimeout(() => {
    const scene = document.getElementById('scene');
    const card = document.getElementById('card');
    const envelope = document.getElementById('envelope-wrap');

    // Fade out envelope
    envelope.style.transition = 'opacity 0.5s';
    envelope.style.opacity = '0';

    // Move card to normal flow
    card.classList.remove('rising');
    card.classList.add('final');

    // Rearrange scene to column flow
    scene.style.flexDirection = 'column';
    scene.style.alignItems = 'center';
    scene.style.justifyContent = 'center';

    setTimeout(() => envelope.style.display = 'none', 500);

    // Show details
    setTimeout(() => {
      document.getElementById('details').classList.add('show');
    }, 300);
  }, 2000);
}

// ── Music ──
let musicOn = false;
function toggleMusic() {
  const audio = document.getElementById('bg-music');
  if (musicOn) {
    audio.pause();
    document.getElementById('music-btn').textContent = '🎵';
  } else {
    audio.play().catch(()=>{});
    document.getElementById('music-btn').textContent = '⏸';
  }
  musicOn = !musicOn;
}
</script>
